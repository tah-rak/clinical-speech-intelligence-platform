steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/csip-backend', './backend']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/csip-backend']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'csip-backend'
      - '--image=gcr.io/$PROJECT_ID/csip-backend'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # Set DATABASE_URL via Secret Manager in production — do not use placeholder credentials
      - '--set-env-vars=DATABASE_URL=${_DATABASE_URL}'
