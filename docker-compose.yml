services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: csip
      # Dev-only password — change before any production deployment
      POSTGRES_PASSWORD: csip
      POSTGRES_DB: csip
    # Not published to host — DB is only reachable inside the Docker network
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://csip:csip@db:5432/csip
    volumes:
      - ./backend/uploads:/app/uploads
      - ./sample_data:/app/sample_data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
